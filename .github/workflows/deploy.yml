name: deploy-to-gce

on:
  pull_request:
    types: [labeled]

jobs:
  deploy:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'dev' || github.event.label.name == 'stg' || github.event.label.name == 'prd')
    uses: deg-labs/github-workflows/.github/workflows/gce-deploy.yml@main
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    with:
      enforce_deploy_team: true
      start_instance: ${{ github.event.label.name != 'prd' }}
      gce_instance_secret: ${{ github.event.label.name == 'dev' && 'DEV_GCE_INSTANCE_NAME' || github.event.label.name == 'stg' && 'STG_GCE_INSTANCE_NAME' || 'PRD_GCE_INSTANCE_NAME' }}
      gce_zone_secret: GCE_ZONE
      gcp_sa_email_secret: ${{ github.event.label.name == 'dev' && 'DEV_GCP_SA_EMAIL' || github.event.label.name == 'stg' && 'STG_GCP_SA_EMAIL' || 'PRD_GCP_SA_EMAIL' }}
      gcp_wif_provider_secret: ${{ github.event.label.name == 'dev' && 'DEV_GCP_WIF_PROVIDER' || github.event.label.name == 'stg' && 'STG_GCP_WIF_PROVIDER' || 'PRD_GCP_WIF_PROVIDER' }}
      discord_webhook_secret: ${{ github.event.label.name == 'dev' && 'DEV_DISCORD_WEBHOOK_URL' || github.event.label.name == 'stg' && 'STG_DISCORD_WEBHOOK_URL' || 'PRD_DISCORD_WEBHOOK_URL' }}
      addresses_secret: ${{ github.event.label.name == 'dev' && 'DEV_ADDRESSES_TXT' || github.event.label.name == 'stg' && 'STG_ADDRESSES_TXT' || 'PRD_ADDRESSES_TXT' }}
      github_app_id_secret: ORG_GH_APP_ID
      github_app_private_key_secret: ORG_GH_APP_PRIVATE_KEY
      notification_suppression_seconds: ${{ vars.NOTIFICATION_SUPPRESSION_SECONDS || '3600' }}
      artifact_excludes: |
        data
      additional_upload_files: |
        .env
      prepare_command: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y gettext-base
        export DB_DIRECTORY='./data'
        envsubst < .env.template > .env
        printf '%s' "${ADDRESSES_TXT}" > addresses.txt
      remote_deploy_command: |
        set -e
        TARGET_DIR='/opt/apps/hdm'
        sudo rm -rf "$TARGET_DIR"
        sudo mkdir -p "$TARGET_DIR"
        sudo chown -R "$(id -u):$(id -g)" "$TARGET_DIR"
        tar -xzf ~/app.tar.gz -C "$TARGET_DIR"
        mv -f ~/.env "$TARGET_DIR/.env"
        cd "$TARGET_DIR"
        sudo docker compose down
        sudo docker compose up -d --build
        sudo docker image prune -f || true
