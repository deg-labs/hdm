name: deploy-to-gce

on:
  pull_request:
    types: [labeled]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      (github.event.label.name == 'dev' || github.event.label.name == 'stg' || github.event.label.name == 'prd')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set environment vars by label
        run: |
          case "${{ github.event.label.name }}" in
            dev)
              echo "GCE_INSTANCE_NAME=${{ secrets.DEV_GCE_INSTANCE_NAME }}" >> "$GITHUB_ENV"
              echo "GCP_SA_EMAIL=${{ secrets.DEV_GCP_SA_EMAIL }}" >> "$GITHUB_ENV"
              echo "GCP_WIF_PROVIDER=${{ secrets.DEV_GCP_WIF_PROVIDER }}" >> "$GITHUB_ENV"
              echo "DISCORD_WEBHOOK_URL=${{ secrets.DEV_DISCORD_WEBHOOK_URL }}" >> "$GITHUB_ENV"
              {
                echo "ADDRESSES_TXT<<EOF"
                echo "${{ secrets.DEV_ADDRESSES_TXT }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            stg)
              echo "GCE_INSTANCE_NAME=${{ secrets.STG_GCE_INSTANCE_NAME }}" >> "$GITHUB_ENV"
              echo "GCP_SA_EMAIL=${{ secrets.STG_GCP_SA_EMAIL }}" >> "$GITHUB_ENV"
              echo "GCP_WIF_PROVIDER=${{ secrets.STG_GCP_WIF_PROVIDER }}" >> "$GITHUB_ENV"
              echo "DISCORD_WEBHOOK_URL=${{ secrets.STG_DISCORD_WEBHOOK_URL }}" >> "$GITHUB_ENV"
              {
                echo "ADDRESSES_TXT<<EOF"
                echo "${{ secrets.STG_ADDRESSES_TXT }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            prd)
              echo "GCE_INSTANCE_NAME=${{ secrets.PRD_GCE_INSTANCE_NAME }}" >> "$GITHUB_ENV"
              echo "GCP_SA_EMAIL=${{ secrets.PRD_GCP_SA_EMAIL }}" >> "$GITHUB_ENV"
              echo "GCP_WIF_PROVIDER=${{ secrets.PRD_GCP_WIF_PROVIDER }}" >> "$GITHUB_ENV"
              echo "DISCORD_WEBHOOK_URL=${{ secrets.PRD_DISCORD_WEBHOOK_URL }}" >> "$GITHUB_ENV"
              {
                echo "ADDRESSES_TXT<<EOF"
                echo "${{ secrets.PRD_ADDRESSES_TXT }}"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
          esac

      # 1. Google Cloud Auth (Workload Identity Federation)
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      # 2. Generate .env from secrets
      - name: Generate .env
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
          export DISCORD_WEBHOOK_URL="${{ env.DISCORD_WEBHOOK_URL }}"
          export NOTIFICATION_SUPPRESSION_SECONDS="${{ vars.NOTIFICATION_SUPPRESSION_SECONDS || 600 }}"
          export DB_DIRECTORY="./data"
          # Add other variables here as needed
          envsubst < .env.template > .env
          printf "%s" "${{ env.ADDRESSES_TXT }}" > addresses.txt

      # 3. Create artifact and Upload to GCE
      - name: Create and Upload Artifacts
        run: |
          # Pack source to /tmp to avoid "file changed as we read it" error
          # Exclude .git, .env (managed separately), and data (persistent on VM)
          tar -C "$GITHUB_WORKSPACE" -czf /tmp/app.tar.gz \
            --exclude=.git \
            --exclude=.env \
            --exclude=data \
            .
          
          # Upload .env and app.tar.gz to GCE home directory
          gcloud compute scp .env /tmp/app.tar.gz ${{ env.GCE_INSTANCE_NAME }}:~ \
            --zone ${{ secrets.GCE_ZONE }}

      # 4. SSH to Deploy
      - name: Deploy on GCE
        run: |
          gcloud compute ssh ${{ env.GCE_INSTANCE_NAME }} \
            --zone ${{ secrets.GCE_ZONE }} \
            --command "
              set -e
              TARGET_DIR='/opt/apps/hdm'

              # 1) Ensure target directory exists and is owned by current user
              sudo mkdir -p \"\$TARGET_DIR\"
              sudo chown -R \$(id -u):\$(id -g) \"\$TARGET_DIR\"

              # 2) Extract source code
              # -o overwrites without complaining, -C changes dir before extracting
              tar -xzf ~/app.tar.gz -C \"\$TARGET_DIR\"
              rm ~/app.tar.gz

              # 3) Move .env to target directory
              mv -f ~/.env \"\$TARGET_DIR/.env\"
              
              # 4) Restart services
              cd \"\$TARGET_DIR\"
              echo \"Starting Docker Compose...\"
              sudo docker compose down
              sudo docker compose up -d --build
              sudo docker image prune -f || true
            "
