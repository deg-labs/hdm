name: deploy-to-gce

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # 1. Google Cloud Auth (Workload Identity Federation)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      # 2. Generate .env from secrets
      - name: Generate .env
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
          export DISCORD_WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          export NOTIFICATION_SUPPRESSION_SECONDS="${{ vars.NOTIFICATION_SUPPRESSION_SECONDS || 600 }}"
          export DB_DIRECTORY="./data"
          # Add other variables here as needed
          envsubst < .env.template > .env

      # 3. Upload .env to GCE (to the generated user's home dir first)
      # We omit the username so gcloud uses the authenticated SA identity (OS Login)
      - name: Upload .env to GCE
        run: |
          gcloud compute scp .env ${{ secrets.GCE_INSTANCE_NAME }}:~/.env \
            --zone ${{ secrets.GCE_ZONE }}

      # 4. SSH to Deploy
      # Move .env from home to app dir (requires sudo)
      - name: Deploy on GCE
        run: |
          gcloud compute ssh ${{ secrets.GCE_INSTANCE_NAME }} \
            --zone ${{ secrets.GCE_ZONE }} \
            --command "
              set -e
              # Move .env from home to app dir (requires sudo)
              sudo mv ~/.env /opt/apps/hdm/.env
              sudo chown $(id -u):$(id -g) /opt/apps/hdm/.env

              cd /opt/apps/hdm
              
              # Ensure git considers this directory safe (in case owner differs)
              git config --global --add safe.directory /opt/apps/hdm
              
              git fetch --all
              git reset --hard origin/main
              
              # Update dependencies
              docker compose pull || true
              docker compose up -d --build
              docker image prune -f || true
            "
